<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repositório Wesley</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
}

/* HEADER */
header {
    padding: 30px;
    text-align: center;
    border-bottom: 1px solid #30363d;
}

header h1 {
    font-size: 2.5rem;
    color: #58a6ff;
}

header p {
    color: #8b949e;
    margin-top: 8px;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

/* CATEGORIAS */
.category {
    margin-bottom: 50px;
}

.category h2 {
    font-size: 1.6rem;
    margin-bottom: 20px;
    border-left: 5px solid #58a6ff;
    padding-left: 10px;
}

/* LISTA */
.repo-list {
    list-style: none;
}

.repo-item {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 15px;
    transition: 0.3s ease;
    border: 1px solid #30363d;
}

.repo-item:hover {
    background: #1f2937;
    transform: translateX(5px);
}

.repo-item h3 {
    color: #58a6ff;
    margin-bottom: 5px;
}

.repo-item p {
    color: #8b949e;
    font-size: 0.95rem;
}

.repo-item a {
    text-decoration: none;
    color: #238636;
    font-weight: bold;
    display: inline-block;
    margin-top: 10px;
}

.repo-item a:hover {
    text-decoration: underline;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #30363d;
    color: #8b949e;
}
</style>
</head>

<body>

<header>
    <h1>📦 Repositório Wesley</h1>
    <p>Catálogo oficial dos meus projetos</p>
</header>

<div class="container">

    <section class="category">
        <h2>⚙️ Backend</h2>
        <ul class="repo-list">
            <li class="repo-item">
                <h3>Inicio Backend</h3>
                <p>Backend principal do sistema.</p>
                <a href="https://github.com/lightning133/inicio-backend" target="_blank">
                    Ver no GitHub
                </a>
            </li>
        </ul>
    </section>

    <section class="category">
        <h2>🌐 Frontend</h2>
        <ul class="repo-list">
            <li class="repo-item">
                <h3>Projeto Futuro</h3>
                <p>Espaço reservado para novos projetos.</p>
                <a href="#">Em breve</a>
            </li>
        </ul>
    </section>

</div>

<footer>
    © 2026 - Wesley Roberto
</footer>

<!-- JS DO SEU REPOSITÓRIO -->
<script src="https://cdn.jsdelivr.net/gh/lightning133/inicio-backend@main/main.js"></script>

</body>
</html>
